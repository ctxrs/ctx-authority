name: SDLC

on:
  pull_request:
  push:
    branches:
      - main
      - dev
      - lane/**

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_TARGET_DIR: /tmp/ctxa-target
      SCCACHE_DIR: /tmp/ctxa-sccache
      RUSTC_WRAPPER: ""
      CARGO_BUILD_JOBS: "2"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libdbus-1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Bazel
        uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: /tmp/ctxa-bazel-disk-cache
          repository-cache: /tmp/ctxa-bazel-repository-cache

      - name: Cargo format
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Cargo test
        run: cargo test --all-targets --all-features --locked

      - name: Bazel smoke and leak tests
        run: bazel test //:unit_tests //:cli_smoke_tests //:leak_scan
